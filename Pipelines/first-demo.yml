name: First GitHub Actions Demo

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  demo-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Print welcome message
        run: echo "Hello GitHub Actions"

      - name: Show runner operating system
        run: uname -a

      - name: Show current directory
        run: pwd

      - name: List repository files
        run: ls -la

      - name: Create a sample output file
        run: echo "This file is generated by GitHub Actions" > output.txt

      - name: Show output file content
        run: cat output.txt